<!-- pages/projects.html — M1: Project Management -->
<!-- Hiển thị danh sách projects, tạo mới, edit, archive, delete -->

<div x-show="currentPage === 'projects'" x-data="projectsPage()">
<div class="ts-page">

  <!-- Page Header -->
  <div class="ts-page-header">
    <div>
      <h1 class="ts-page-title">Projects</h1>
      <p class="ts-page-subtitle">Manage your SEO projects and client websites</p>
    </div>
    <sl-button variant="primary" @click="openCreateModal()">
      <i data-lucide="plus" class="w-4 h-4" slot="prefix"></i>
      New Project
    </sl-button>
  </div>

  <!-- Stats Cards -->
  <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 sm:gap-4 mb-6">
    <div class="ts-stat-card">
      <div class="ts-stat-icon">
        <i data-lucide="folder" class="w-5 h-5"></i>
      </div>
      <div class="ts-stat-value" x-text="stats.total">0</div>
      <div class="ts-stat-label">Total Projects</div>
    </div>
    <div class="ts-stat-card">
      <div class="ts-stat-icon bg-gradient-to-br from-emerald-50 to-emerald-100/50 ring-1 ring-emerald-100">
        <i data-lucide="activity" class="w-5 h-5 text-emerald-600"></i>
      </div>
      <div class="ts-stat-value" x-text="stats.active">0</div>
      <div class="ts-stat-label">Active</div>
    </div>
    <div class="ts-stat-card">
      <div class="ts-stat-icon bg-gradient-to-br from-amber-50 to-amber-100/50 ring-1 ring-amber-100">
        <i data-lucide="pause-circle" class="w-5 h-5 text-amber-600"></i>
      </div>
      <div class="ts-stat-value" x-text="stats.paused">0</div>
      <div class="ts-stat-label">Paused</div>
    </div>
    <div class="ts-stat-card">
      <div class="ts-stat-icon bg-gradient-to-br from-slate-50 to-slate-100/50 ring-1 ring-slate-200">
        <i data-lucide="archive" class="w-5 h-5 text-slate-500"></i>
      </div>
      <div class="ts-stat-value" x-text="stats.archived">0</div>
      <div class="ts-stat-label">Archived</div>
    </div>
  </div>

  <!-- Filter Bar -->
  <div class="ts-filter-bar">
    <sl-input
      id="project-search"
      placeholder="Search projects..."
      size="small"
      class="w-full sm:w-64"
      x-model="searchQuery"
      @sl-input="currentPage_ = 1"
      clearable
    >
      <i data-lucide="search" class="w-4 h-4" slot="prefix"></i>
    </sl-input>
    <sl-select
      id="project-status-filter"
      placeholder="All Statuses"
      size="small"
      class="w-full sm:w-40"
      x-model="filterStatus"
      @sl-change="filterStatus = $event.target.value; currentPage_ = 1"
      clearable
    >
      <sl-option value="active">Active</sl-option>
      <sl-option value="paused">Paused</sl-option>
      <sl-option value="completed">Completed</sl-option>
      <sl-option value="archived">Archived</sl-option>
    </sl-select>
    <div class="flex-1 hidden sm:block"></div>
    <span class="text-xs text-slate-400" x-text="`${filteredProjects.length} project(s)`"></span>
  </div>

  <!-- Loading Skeleton -->
  <template x-if="loading">
    <div class="ts-table-container">
      <div class="ts-table-scroll">
        <table class="ts-table">
          <thead>
            <tr>
              <th>Project</th><th>Client</th><th>Domain</th><th>Status</th><th>Created</th><th></th>
            </tr>
          </thead>
          <tbody>
            <template x-for="i in 5">
              <tr class="ts-skeleton-row">
                <td><div class="ts-skeleton-cell w-40"></div></td>
                <td><div class="ts-skeleton-cell w-28"></div></td>
                <td><div class="ts-skeleton-cell w-36"></div></td>
                <td><div class="ts-skeleton-cell w-16"></div></td>
                <td><div class="ts-skeleton-cell w-20"></div></td>
                <td><div class="ts-skeleton-cell w-10"></div></td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </div>
  </template>

  <!-- Empty State -->
  <template x-if="!loading && filteredProjects.length === 0">
    <div class="ts-empty-state">
      <div class="ts-empty-icon">
        <i data-lucide="folder-open" class="w-10 h-10"></i>
      </div>
      <h3 class="text-lg font-semibold text-slate-700 mb-2">No Projects Found</h3>
      <p class="text-sm text-slate-400 mb-6" x-text="searchQuery || filterStatus ? 'Try adjusting your search or filter' : 'Create your first SEO project to get started'"></p>
      <sl-button variant="primary" @click="openCreateModal()" x-show="!searchQuery && !filterStatus">
        <i data-lucide="plus" class="w-4 h-4" slot="prefix"></i>
        Create First Project
      </sl-button>
    </div>
  </template>

  <!-- Project Table -->
  <template x-if="!loading && filteredProjects.length > 0">
    <div class="ts-table-container">
      <div class="ts-table-scroll">
        <table id="project-table" class="ts-table">
          <thead>
            <tr>
              <th class="cursor-pointer" @click="toggleSort('name')">
                <span class="flex items-center gap-1">
                  Project
                  <i :data-lucide="sortField === 'name' ? (sortDir === 'asc' ? 'chevron-up' : 'chevron-down') : 'chevrons-up-down'" class="w-3 h-3 text-slate-400"></i>
                </span>
              </th>
              <th class="hidden sm:table-cell">Client</th>
              <th class="hidden md:table-cell">Domain</th>
              <th class="cursor-pointer" @click="toggleSort('status')">
                <span class="flex items-center gap-1">
                  Status
                  <i :data-lucide="sortField === 'status' ? (sortDir === 'asc' ? 'chevron-up' : 'chevron-down') : 'chevrons-up-down'" class="w-3 h-3 text-slate-400"></i>
                </span>
              </th>
              <th class="hidden lg:table-cell cursor-pointer" @click="toggleSort('created_at')">
                <span class="flex items-center gap-1">
                  Created
                  <i :data-lucide="sortField === 'created_at' ? (sortDir === 'asc' ? 'chevron-up' : 'chevron-down') : 'chevrons-up-down'" class="w-3 h-3 text-slate-400"></i>
                </span>
              </th>
              <th class="text-right">Actions</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="project in paginatedProjects" :key="project.project_id">
              <tr class="group">
                <td>
                  <div class="flex items-center gap-2 sm:gap-3">
                    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-100 to-indigo-50 flex items-center justify-center ring-1 ring-indigo-200/50 shrink-0">
                      <i data-lucide="folder" class="w-4 h-4 text-indigo-600"></i>
                    </div>
                    <div class="min-w-0">
                      <div class="font-semibold text-slate-800 truncate" x-text="project.name"></div>
                      <div class="text-xs text-slate-400 truncate sm:hidden" x-text="project.domain"></div>
                    </div>
                  </div>
                </td>
                <td class="hidden sm:table-cell">
                  <span class="text-slate-600" x-text="project.client_name || '—'"></span>
                </td>
                <td class="hidden md:table-cell">
                  <a :href="project.domain" target="_blank" class="text-indigo-600 hover:underline text-sm flex items-center gap-1 truncate max-w-[200px]" x-text="project.domain">
                  </a>
                </td>
                <td>
                  <span class="ts-badge-status" :class="`ts-badge-${project.status}`" x-text="project.status"></span>
                </td>
                <td class="hidden lg:table-cell">
                  <span class="text-slate-500 text-sm" x-text="formatDate(project.created_at)"></span>
                </td>
                <td class="text-right">
                  <div class="flex items-center justify-end gap-1 opacity-100 sm:opacity-0 sm:group-hover:opacity-100 transition-opacity">
                    <!-- Chọn / mở project -->
                    <sl-tooltip content="Open project">
                      <button class="p-1.5 rounded-lg hover:bg-indigo-50 text-slate-400 hover:text-indigo-600 transition-colors" @click="selectProject(project)">
                        <i data-lucide="external-link" class="w-4 h-4"></i>
                      </button>
                    </sl-tooltip>
                    <!-- Edit -->
                    <sl-tooltip content="Edit">
                      <button class="p-1.5 rounded-lg hover:bg-slate-100 text-slate-400 hover:text-slate-700 transition-colors" @click="openEditModal(project)">
                        <i data-lucide="pencil" class="w-4 h-4"></i>
                      </button>
                    </sl-tooltip>
                    <!-- Duplicate — ẩn trên mobile nhỏ -->
                    <sl-tooltip content="Duplicate">
                      <button class="p-1.5 rounded-lg hover:bg-slate-100 text-slate-400 hover:text-slate-700 transition-colors hidden sm:inline-flex" :disabled="duplicating" @click="duplicateProject(project.project_id)">
                        <i data-lucide="copy" class="w-4 h-4"></i>
                      </button>
                    </sl-tooltip>
                    <!-- Archive / Unarchive — ẩn trên mobile nhỏ -->
                    <sl-tooltip :content="project.status === 'archived' ? 'Unarchive' : 'Archive'">
                      <button class="p-1.5 rounded-lg hover:bg-amber-50 text-slate-400 hover:text-amber-600 transition-colors hidden sm:inline-flex" @click="archiveProject(project)">
                        <i :data-lucide="project.status === 'archived' ? 'archive-restore' : 'archive'" class="w-4 h-4"></i>
                      </button>
                    </sl-tooltip>
                    <!-- Delete -->
                    <sl-tooltip content="Delete">
                      <button class="p-1.5 rounded-lg hover:bg-rose-50 text-slate-400 hover:text-rose-600 transition-colors" @click="deleteProject(project)">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                      </button>
                    </sl-tooltip>
                  </div>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div class="flex items-center justify-between px-3 sm:px-5 py-3 border-t border-slate-100 text-sm text-slate-500" x-show="totalPages > 1">
        <span x-text="`Page ${currentPage_} of ${totalPages}`"></span>
        <div class="flex gap-1">
          <sl-button size="small" variant="default" :disabled="currentPage_ <= 1" @click="currentPage_--">
            <i data-lucide="chevron-left" class="w-4 h-4"></i>
          </sl-button>
          <sl-button size="small" variant="default" :disabled="currentPage_ >= totalPages" @click="currentPage_++">
            <i data-lucide="chevron-right" class="w-4 h-4"></i>
          </sl-button>
        </div>
      </div>
    </div>
  </template>
</div>

  <!-- ── Create / Edit Modal ──────────────────────────────────────── -->
  <sl-dialog
    id="project-form-dialog"
    :label="editingProject ? 'Edit Project' : 'New Project'"
    :open="showFormModal"
    @sl-hide="showFormModal = false"
  >
    <div class="space-y-4">
      <sl-input id="pf-name" label="Project Name" placeholder="My SEO Project" x-model="formData.name" required></sl-input>
      <sl-input id="pf-client" label="Client Name" placeholder="Client Corp" x-model="formData.client_name"></sl-input>
      <sl-input id="pf-domain" label="Domain" placeholder="https://example.com" x-model="formData.domain" required></sl-input>
      <sl-input id="pf-gsc" label="GSC Site URL" placeholder="https://example.com/" x-model="formData.gsc_site_url">
        <i data-lucide="bar-chart-2" class="w-4 h-4 text-slate-400" slot="prefix"></i>
      </sl-input>
      <sl-textarea id="pf-notes" label="Notes" placeholder="Optional project notes..." x-model="formData.notes" rows="2" resize="none"></sl-textarea>
    </div>
    <div slot="footer" class="flex gap-2 justify-end">
      <sl-button @click="showFormModal = false">Cancel</sl-button>
      <sl-button variant="primary" :loading="saving" @click="saveProject()">
        <i data-lucide="save" class="w-4 h-4" slot="prefix"></i>
        <span x-text="editingProject ? 'Update' : 'Create Project'"></span>
      </sl-button>
    </div>
  </sl-dialog>

  <!-- ── Delete Confirm Dialog ───────────────────────────────────── -->
  <sl-dialog
    id="project-delete-dialog"
    label="Delete Project"
    :open="showDeleteModal"
    @sl-hide="showDeleteModal = false"
  >
    <div class="flex items-start gap-3">
      <div class="w-10 h-10 rounded-full bg-rose-100 flex items-center justify-center flex-shrink-0">
        <i data-lucide="alert-triangle" class="w-5 h-5 text-rose-600"></i>
      </div>
      <div>
        <p class="font-semibold text-slate-800">Are you sure?</p>
        <p class="text-sm text-slate-500 mt-1">
          This will permanently delete project <strong x-text="deleteTarget?.name"></strong> and its Google Sheet. This action cannot be undone.
        </p>
      </div>
    </div>
    <div slot="footer" class="flex gap-2 justify-end">
      <sl-button @click="showDeleteModal = false">Cancel</sl-button>
      <sl-button variant="danger" :loading="deleting" @click="confirmDelete()">
        <i data-lucide="trash-2" class="w-4 h-4" slot="prefix"></i>
        Delete Project
      </sl-button>
    </div>
  </sl-dialog>

</div>

<script>
// pages/projects.html — Alpine component cho project management
function projectsPage() {
  return {
    // ── State ─────────────────────────────────────────────────
    projectList: [],
    loading: false,
    searchQuery: '',
    filterStatus: '',
    sortField: 'created_at',
    sortDir: 'desc',
    currentPage_: 1,
    pageSize: 50,

    // Modal state
    showFormModal: false,
    showDeleteModal: false,
    editingProject: null,
    deleteTarget: null,
    saving: false,
    deleting: false,
    duplicating: false,

    formData: { name: '', client_name: '', domain: '', gsc_site_url: '', notes: '' },

    // ── Lifecycle ─────────────────────────────────────────────
    async init() {
      await this.loadProjects();
      // Lắng nghe khi có project mới tạo từ top-bar
      this.$el.closest('body').addEventListener('project-changed', () => {
        this.syncFromAppShell();
      });
      this.$nextTick(() => lucide.createIcons());
    },

    // ── Computed ──────────────────────────────────────────────
    get stats() {
      const all = this.projectList;
      return {
        total:    all.length,
        active:   all.filter(p => p.status === 'active').length,
        paused:   all.filter(p => p.status === 'paused').length,
        archived: all.filter(p => p.status === 'archived').length
      };
    },

    get filteredProjects() {
      let list = [...this.projectList];

      // Tìm kiếm theo tên, client, domain
      if (this.searchQuery) {
        const q = this.searchQuery.toLowerCase();
        list = list.filter(p =>
          (p.name || '').toLowerCase().includes(q) ||
          (p.client_name || '').toLowerCase().includes(q) ||
          (p.domain || '').toLowerCase().includes(q)
        );
      }

      // Lọc theo status
      if (this.filterStatus) {
        list = list.filter(p => p.status === this.filterStatus);
      }

      // Sắp xếp
      list.sort((a, b) => {
        const valA = (a[this.sortField] || '').toString().toLowerCase();
        const valB = (b[this.sortField] || '').toString().toLowerCase();
        const cmp = valA.localeCompare(valB);
        return this.sortDir === 'asc' ? cmp : -cmp;
      });

      return list;
    },

    get totalPages() {
      return Math.ceil(this.filteredProjects.length / this.pageSize) || 1;
    },

    get paginatedProjects() {
      const start = (this.currentPage_ - 1) * this.pageSize;
      return this.filteredProjects.slice(start, start + this.pageSize);
    },

    // ── Actions ───────────────────────────────────────────────
    async loadProjects() {
      this.loading = true;
      try {
        this.projectList = await callServer('project.getAll') || [];
      } catch (e) {
        this.$dispatch('show-toast', { message: e.message, type: 'danger' });
      } finally {
        this.loading = false;
        this.$nextTick(() => lucide.createIcons());
      }
    },

    // Đồng bộ project list từ appShell khi có thay đổi
    syncFromAppShell() {
      // Đợi appShell cập nhật xong
      this.$nextTick(() => {
        if (this.projects && this.projects.length) {
          this.projectList = [...this.projects];
        }
      });
    },

    toggleSort(field) {
      if (this.sortField === field) {
        this.sortDir = this.sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        this.sortField = field;
        this.sortDir = 'asc';
      }
      this.$nextTick(() => lucide.createIcons());
    },

    // Chọn project → switch sang dashboard
    selectProject(project) {
      this.switchProject(project.project_id);
      this.navigate('dashboard');
    },

    // ── Create / Edit ─────────────────────────────────────────
    openCreateModal() {
      this.editingProject = null;
      this.formData = { name: '', client_name: '', domain: '', gsc_site_url: '', notes: '' };
      this.showFormModal = true;
      this.$nextTick(() => lucide.createIcons());
    },

    openEditModal(project) {
      this.editingProject = project;
      this.formData = {
        name: project.name || '',
        client_name: project.client_name || '',
        domain: project.domain || '',
        gsc_site_url: project.gsc_site_url || '',
        notes: project.notes || ''
      };
      this.showFormModal = true;
      this.$nextTick(() => lucide.createIcons());
    },

    async saveProject() {
      // Validate
      if (!this.formData.name || !this.formData.domain) {
        this.$dispatch('show-toast', { message: 'Project name and domain are required', type: 'warning' });
        return;
      }

      this.saving = true;
      try {
        if (this.editingProject) {
          // Update
          await callServer('project.update', {
            projectId: this.editingProject.project_id,
            data: this.formData
          });
          // Cập nhật local state
          const idx = this.projectList.findIndex(p => p.project_id === this.editingProject.project_id);
          if (idx !== -1) {
            this.projectList[idx] = { ...this.projectList[idx], ...this.formData };
          }
          this.$dispatch('show-toast', { message: `Project "${this.formData.name}" updated`, type: 'success' });
          // Đồng bộ lại appShell projects list
          await this.loadProjects();
          // Cập nhật appShell selector
          this.projects = [...this.projectList];
        } else {
          // Create mới
          const created = await callServer('project.create', { data: this.formData });
          this.projectList.push(created);
          // Đồng bộ lên appShell
          this.projects = [...this.projectList];
          this.$dispatch('show-toast', { message: `Project "${created.name}" created`, type: 'success' });
        }
        this.showFormModal = false;
      } catch (e) {
        this.$dispatch('show-toast', { message: e.message, type: 'danger' });
      } finally {
        this.saving = false;
        this.$nextTick(() => lucide.createIcons());
      }
    },

    // ── Duplicate ─────────────────────────────────────────────
    async duplicateProject(projectId) {
      this.duplicating = true;
      try {
        const dup = await callServer('project.duplicate', { projectId });
        this.projectList.push(dup);
        this.projects = [...this.projectList];
        this.$dispatch('show-toast', { message: `Project duplicated as "${dup.name}"`, type: 'success' });
      } catch (e) {
        this.$dispatch('show-toast', { message: e.message, type: 'danger' });
      } finally {
        this.duplicating = false;
        this.$nextTick(() => lucide.createIcons());
      }
    },

    // ── Archive / Unarchive ───────────────────────────────────
    async archiveProject(project) {
      const isArchived = project.status === 'archived';
      try {
        if (isArchived) {
          await callServer('project.update', { projectId: project.project_id, data: { status: 'active' } });
          project.status = 'active';
          this.$dispatch('show-toast', { message: `Project "${project.name}" restored`, type: 'success' });
        } else {
          await callServer('project.archive', { projectId: project.project_id });
          project.status = 'archived';
          this.$dispatch('show-toast', { message: `Project "${project.name}" archived`, type: 'success' });
        }
        // Cập nhật appShell
        this.projects = [...this.projectList];
      } catch (e) {
        this.$dispatch('show-toast', { message: e.message, type: 'danger' });
      }
      this.$nextTick(() => lucide.createIcons());
    },

    // ── Delete ────────────────────────────────────────────────
    deleteProject(project) {
      this.deleteTarget = project;
      this.showDeleteModal = true;
      this.$nextTick(() => lucide.createIcons());
    },

    async confirmDelete() {
      if (!this.deleteTarget) return;
      this.deleting = true;
      try {
        await callServer('project.delete', { projectId: this.deleteTarget.project_id });
        this.projectList = this.projectList.filter(p => p.project_id !== this.deleteTarget.project_id);
        // Nếu project đang chọn bị xoá → reset
        if (this.currentProjectId === this.deleteTarget.project_id) {
          this.currentProjectId = null;
          this.currentProject = null;
          sessionStorage.removeItem('currentProjectId');
        }
        this.projects = [...this.projectList];
        this.$dispatch('show-toast', { message: `Project "${this.deleteTarget.name}" deleted`, type: 'success' });
        this.showDeleteModal = false;
        this.deleteTarget = null;
      } catch (e) {
        this.$dispatch('show-toast', { message: e.message, type: 'danger' });
      } finally {
        this.deleting = false;
        this.$nextTick(() => lucide.createIcons());
      }
    },

    // ── Helpers ────────────────────────────────────────────────
    formatDate(dateStr) {
      if (!dateStr) return '—';
      try {
        return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      } catch { return dateStr; }
    }
  };
}
</script>
